<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #06090f;
    color: #c5d4e3;
    line-height: 1.6;
    padding: 24px;
    max-width: 1280px;
    margin: 0 auto;
  }
  h1 { color: #66ffcc; font-size: 26px; margin-bottom: 6px; }
  .subtitle { color: #6a7888; font-size: 13px; margin-bottom: 24px; }
  
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    background: #0d1420;
    border: 1px solid #1a2530;
    border-radius: 4px;
    color: #c5d4e3;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #66ffcc22;
    border-color: #66ffcc;
    color: #66ffcc;
  }
  
  .character-section {
    margin-bottom: 32px;
  }
  .character-header {
    font-size: 14px;
    font-weight: 600;
    color: #ffaa55;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: #0d1420;
    border-radius: 4px;
    border-left: 4px solid #ffaa55;
  }
  
  .character-novice .character-header { border-left-color: #66ffcc; color: #66ffcc; }
  .character-veteran .character-header { border-left-color: #ffaa55; color: #ffaa55; }
  .character-heretic .character-header { border-left-color: #ff5577; color: #ff5577; }
  .character-suit .character-header { border-left-color: #00ccff; color: #00ccff; }
  
  .mission-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  
  .mission-card {
    background: #0d1420;
    border: 1px solid #1a2530;
    border-radius: 6px;
    padding: 14px;
    transition: border-color 0.15s ease;
  }
  .mission-card:hover { border-color: #66ffcc; }
  .mission-card .id {
    font-size: 11px;
    color: #66ffcc;
    text-transform: lowercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .mission-card .title {
    font-size: 13px;
    color: #c5d4e3;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .mission-card .meta {
    font-size: 10px;
    color: #6a7888;
    margin-bottom: 8px;
  }
  .mission-card .arc-pill {
    display: inline-block;
    padding: 2px 8px;
    background: #1a1a2e;
    color: #66ffcc;
    border-radius: 2px;
    font-size: 10px;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .mission-card .pillar-pill {
    display: inline-block;
    padding: 2px 8px;
    background: #2a3540;
    color: #ffaaff;
    border-radius: 2px;
    font-size: 10px;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .mission-card .grade-bar {
    height: 4px;
    background: #1a2530;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .mission-card .grade-fill {
    height: 100%;
    background: linear-gradient(90deg, #88dd44, #ffaa55, #ff5577);
  }
  
  .story-link {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    color: #00ccff;
    text-decoration: none;
    border-bottom: 1px dotted #00ccff;
  }
  .story-link:hover { color: #66ffcc; border-bottom: 1px solid #66ffcc; }
  
  .legend {
    margin-top: 24px;
    padding: 12px;
    background: #0d1420;
    border-radius: 6px;
    font-size: 12px;
  }
  .cast-pill {
    display: inline-block;
    padding: 1px 6px;
    background: #2a3540;
    color: #88dd44;
    border-radius: 2px;
    font-size: 9px;
  }
</style>

</style>
