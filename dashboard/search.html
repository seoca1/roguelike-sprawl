<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: #06090f;
    color: #c5d4e3;
    line-height: 1.6;
    padding: 24px;
    max-width: 920px;
    margin: 0 auto;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    color: #66ffcc;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #6a7888;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .search-bar {
    width: 100%;
    padding: 14px 18px;
    background: #0d1420;
    border: 1px solid #1a2530;
    border-radius: 6px;
    font-family: inherit;
    font-size: 18px;
    color: #c5d4e3;
    margin-bottom: 16px;
  }
  .search-bar:focus {
    outline: none;
    border-color: #66ffcc;
    box-shadow: 0 0 12px #66ffcc33;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .filter-btn {
    padding: 6px 12px;
    background: #0d1420;
    border: 1px solid #1a2530;
    border-radius: 4px;
    color: #c5d4e3;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #66ffcc22;
    border-color: #66ffcc;
    color: #66ffcc;
  }
  .results-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #6a7888;
    margin-bottom: 12px;
  }
  .result-card {
    background: #0d1420;
    border: 1px solid #1a2530;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.15s ease;
  }
  .result-card:hover {
    border-color: #66ffcc;
  }
  .result-card .title {
    font-size: 18px;
    color: #66ffcc;
    margin-bottom: 4px;
  }
  .result-card .subtitle {
    font-style: italic;
    color: #8a98a8;
    font-size: 14px;
  }
  .result-card .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #6a7888;
    margin-top: 6px;
  }
  .result-card .meta span {
    margin-right: 12px;
  }
  .result-card .preview {
    color: #8a98a8;
    font-size: 13px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #1a2530;
    line-height: 1.5;
  }
  .result-card .preview mark {
    background: #66ffcc55;
    color: #fff;
    padding: 0 2px;
    border-radius: 2px;
  }
  .result-card a {
    color: #66ffcc;
    text-decoration: none;
  }
  .result-card a:hover {
    text-decoration: underline;
  }
  .empty {
    text-align: center;
    color: #6a7888;
    padding: 60px 24px;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
