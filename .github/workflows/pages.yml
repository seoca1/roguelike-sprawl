name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to gh-pages branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify dashboard files exist
        run: |
          echo "Dashboard:"
          ls -la dashboard/
          echo ""
          echo "Design (for fetch()):"
          ls -la design/

      - name: Prepare gh-pages artifact
        run: |
          mkdir -p _pages
          cp dashboard/index.html _pages/index.html
          cp dashboard/story.html _pages/story.html
          cp dashboard/stages.html _pages/stages.html
          cp dashboard/stories.html _pages/stories.html
          cp dashboard/sound.html _pages/sound.html
          cp dashboard/combat.html _pages/combat.html
          cp dashboard/equipment.html _pages/equipment.html
          cp dashboard/cyberspace.html _pages/cyberspace.html
          cp dashboard/achievements.html _pages/achievements.html
          cp dashboard/settings.html _pages/settings.html
          cp dashboard/graphic-novel.html _pages/graphic-novel.html
          cp dashboard/favicon.svg _pages/favicon.svg
          cp -r dashboard/stories/ _pages/stories/
          cp -r design/ _pages/design/
          cp -r Fiction/derivative/ _pages/Fiction/derivative/ 2>/dev/null || true
          cp .nojekyll _pages/.nojekyll 2>/dev/null || touch _pages/.nojekyll
          echo ""
          echo "Artifact contents:"
          find _pages -type f | sort

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_pages
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: dashboard ${{ github.sha }}"

      - name: Enable Pages (gh-pages branch)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.enablePages({
                owner: context.repo.owner,
                repo: context.repo.repo,
                source: { branch: 'gh-pages', path: '/' }
              });
              core.info('Pages enabled on gh-pages branch');
            } catch (e) {
              core.warning('Could not auto-enable Pages (may need manual setup): ' + e.message);
            }
