name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build dashboard artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify dashboard files exist
        run: |
          echo "Repo root files:"
          ls -la
          echo ""
          echo "Dashboard:"
          ls -la dashboard/
          echo ""
          echo "Design:"
          ls -la design/

      - name: Prepare Pages artifact
        run: |
          mkdir -p _pages
          # Main page = roguelike submenu (this repo's dashboard)
          cp dashboard/index.html _pages/index.html
          # Sub-dashboards
          cp dashboard/story.html _pages/story.html
          cp dashboard/stages.html _pages/stages.html
          # Design data so fetch() works
          cp -r design/ _pages/design/
          echo ""
          echo "Artifact contents:"
          find _pages -type f | head -30

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_pages'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

