name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: cd prototype && ruff check .
      - run: cd prototype && ruff format --check .

  typecheck:
    name: Typecheck (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        working-directory: ./prototype
        run: |
          pip install -e ".[dev]"
      - name: Run mypy
        working-directory: ./prototype
        run: mypy src/roguelike_sprawl

  test:
    name: Test (pytest)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: ./prototype
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: ./prototype
        run: pytest -v --tb=short --maxfail=5
      - name: Generate coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        working-directory: ./prototype
        run: |
          pip install pytest-cov
          pytest --cov=src/roguelike_sprawl --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./prototype/coverage.xml
          flags: unittests
          name: codecov-umbrella

  dashboard:
    name: Dashboard validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate dashboard data
        run: |
          python scripts/validate_prologue_data.py
          python scripts/validate_event_dialogues.py
          python scripts/validate_stage_structure.py
      - name: Test dashboard structure
        working-directory: ./prototype
        run: |
          pip install pytest
          pytest tests/unit/test_prologue_dashboard.py tests/unit/test_event_dialogues.py tests/unit/test_stage_dashboard.py tests/unit/test_cross_dashboard.py -v

  ci-success:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, dashboard]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
