name: cross-project integrity

# Runs cross-project integrity suite (ADR-0006 / P3):
#   - Fiction verify_derivative (110/110)
#   - Fiction verify_3way_consistency (55/55)
#   - Fiction motif_check (55/55)
#   - Game verify_missions (48/48)
#   - Game verify_facts (regenerate game_facts.json)
#   - Game pytest (3003+)
#   - Game sync_dashboard_facts auto-call
#
# Triggered on push/PR to main, plus daily cron for daily LLM cost monitoring.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC (after LLM cost summary refreshed)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  fiction-verify:
    name: Fiction structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fiction verify_derivative
        run: python3 Fiction/tools/verify_derivative.py --all --quiet

      - name: Fiction verify_3way_consistency
        run: python3 Fiction/tools/verify_3way_consistency.py --all

      - name: Fiction motif_check
        run: python3 Fiction/tools/story_check.py --motif-check --all

      - name: Fiction verify_derivative (json)
        if: always()
        run: |
          python3 Fiction/tools/verify_derivative.py --all --json > /tmp/derivative.json || true
          python3 -c "import json; d=json.load(open('/tmp/derivative.json')); print('summary:', d.get('summary'))"

  game-verify:
    name: Game structure
    runs-on: ubuntu-latest
    needs: fiction-verify
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          { version: "latest" }

      - name: Sync dependencies
        working-directory: Game/roguelike_sprawl/prototype
        run: uv sync --all-extras

      - name: Download font
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run python scripts/download_font.py

      - name: verify_missions
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run python scripts/verify_story_links.py

      - name: verify_facts
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run python ../scripts/sync_dashboard_facts.py

      - name: Run tests
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run pytest -q

  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    needs: fiction-verify
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          { version: "latest" }

      - name: Sync dependencies
        working-directory: Game/roguelike_sprawl/prototype
        run: uv sync --all-extras

      - name: ruff check
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run ruff check .

      - name: ruff format check
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run ruff format --check .

      - name: mypy
        working-directory: Game/roguelike_sprawl/prototype
        run: uv run mypy src/ || true  # mypy is best-effort, see ADR-0110

  integrity-summary:
    name: Integrity summary
    runs-on: ubuntu-latest
    needs: [fiction-verify, game-verify, lint]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Report results
        run: |
          echo "## Cross-project integrity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fiction verify_derivative | ${{ needs.fiction-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fiction 3way consistency | ${{ needs.fiction-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fiction motif check | ${{ needs.fiction-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game verify_missions | ${{ needs.game-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game verify_facts | ${{ needs.game-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game pytest | ${{ needs.game-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (ruff) | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
