name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: false
        type: string

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build wheel
        run: uv build

      - name: Build tarball
        run: uv build --wheel=false --sdist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel
          path: dist/*.whl

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

      - name: Verify distributions
        run: |
          echo "=== Built artifacts ==="
          ls -lh dist/
          echo ""
          echo "=== Wheel metadata ==="
          uv pip install build --quiet
          python -c "import zipfile; w = zipfile.ZipFile('dist/' + sorted(__import__('glob').glob('dist/*.whl'))[0]); print(w.read('METADATA').decode())"

  test-dist:
    name: Test Distribution Install
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-wheel
          path: dist/
          merge-multiple: true

      - name: Install from wheel
        run: |
          uv pip install dist/*.whl[tcod,pyyaml]

      - name: Verify entry point
        run: |
          python -c "from roguelike_sprawl.engine import app; print('Import OK')"

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, test-dist]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/roguelike-sprawl
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-wheel
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        run: uv publish --repository testpypi

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test-dist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/roguelike-sprawl
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-wheel
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        run: uv publish
