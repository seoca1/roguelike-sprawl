site_name: Roguelike Sprawl — Wiki
site_description: 깁슨 스프롤 3부작 세계관의 사이버펑크 로그라이크 — 디자인, 시스템, 세계관 위키
site_author: Roguelike Sprawl Contributors
repo_url: https://github.com/seoca1/roguelike-sprawl
repo_name: seoca1/roguelike-sprawl
edit_uri: ""

docs_dir: wiki

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - 세계관 (World):
    - 개요: world/sprawl_universe.md
    - Cyberspace: world/cyberspace.md
    - Factions: world/factions.md
    - Glossary: world/glossary.md
    - Style Guide: world/style_guide.md
    - Derivative Stories: world/derivative_stories.md
  - 디자인 (Design):
    - 개요: design/GDD.md
    - 기둥: design/pillars.md
    - Core Loop: design/core_loop.md
    - Story Skeleton: design/story_skeleton.md
  - 시스템 (Systems):
    - Combat: design/systems/combat.md
    - Hacking: design/systems/hacking.md
    - Missions: design/systems/missions.md
    - Difficulty Rating: design/systems/difficulty-rating.md
    - Exploration: design/systems/exploration.md
    - Aftermath: design/systems/aftermath.md
    - ASCII Portraits: design/systems/ascii-portraits.md
    - Inventory: design/systems/inventory.md
    - Dialogue: design/systems/dialogue.md
    - Procgen: design/systems/procgen.md
  - 결정 (Decisions):
    - 개요: decisions/README.md
  - 로드맵 (Roadmap): ROADMAP.md
  - 활동 로그 (Log): log.md